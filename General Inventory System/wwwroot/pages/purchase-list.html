<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Purchase List</title>
    <link rel="stylesheet" href="../css/purchase-list.css">
</head>
<body>

    <div class="container">

        <!-- NAVBAR -->
        <div id="navbar"></div>

        <!-- MAIN -->
        <div class="main">

            <h2>Purchase List</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Vendor</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="purchaseTable"></tbody>
            </table>

        </div>
    </div>

    <!-- MODAL -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h3>Purchase Details</h3>
            <div id="detailBox"></div>
            <button onclick="closeModal()">Close</button>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/guard.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/purchase-list.js"></script>

    <script>
    protectPage();
    </script>

</body>
</html>
