<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

    <h1>Dashboard</h1>

    <button onclick="logout()">Logout</button>

    <script>
    const token = localStorage.getItem("token");

    // simple protection
    if (!token) {
        window.location.href = "login.html";
    }

    function logout() {
        localStorage.removeItem("token");
        window.location.href = "login.html";
    }
    </script>

</body>
</html>
