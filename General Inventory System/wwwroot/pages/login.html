<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 320px;
            background: #ffffff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: 0.2s;
        }

            input:focus {
                border-color: #4a90e2;
                box-shadow: 0 0 4px rgba(74,144,226,0.3);
            }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.2s;
        }

            button:hover {
                background: #357ab8;
            }

        p {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }

        a {
            color: #4a90e2;
            text-decoration: none;
        }

            a:hover {
                text-decoration: underline;
            }

        #msg {
            margin-top: 10px;
            font-size: 13px;
            color: red;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Login</h2>

        <input type="email" id="email" placeholder="Email" />
        <input type="password" id="password" placeholder="Password" />

        <button onclick="login()">Login</button>

        <p>
            Don't have an account?
            <a href="register.html">Register</a>
        </p>

        <p id="msg"></p>
    </div>

    <script src="../js/auth.js"></script>

</body>
</html>
