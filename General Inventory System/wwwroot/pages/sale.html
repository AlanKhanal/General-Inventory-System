<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sales</title>
    <link rel="stylesheet" href="../css/sale.css">
</head>
<body>

    <div class="container">

        <!-- NAVBAR -->
        <div id="navbar"></div>

        <!-- MAIN -->
        <div class="main">

            <h2>Sales Entry</h2>

            <div class="form-box">

                <select id="customerId">
                    <option value="">Walk-in Customer</option>
                </select>

                <button onclick="addItemRow()">+ Add Item</button>
                <button onclick="submitSale()">Submit Sale</button>

                <p id="msg"></p>

            </div>

            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Qty</th>
                        <th>Sales Price</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="itemTable"></tbody>
            </table>

        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/guard.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/sale.js"></script>

    <script>protectPage();</script>

</body>
</html>
