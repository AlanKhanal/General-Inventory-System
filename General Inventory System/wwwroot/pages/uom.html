<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unit of Measure</title>
    <link rel="stylesheet" href="../css/uom.css">
</head>
<body>

    <div class="container">

        <!-- NAVBAR -->
        <div id="navbar"></div>

        <!-- MAIN -->
        <div class="main">

            <h2>Unit of Measure</h2>

            <!-- FORM (ONLY CREATE SUPPORTED) -->
            <div class="form-box">

                <input type="text" id="name" placeholder="Name (KG, PCS)">
                <input type="text" id="code" placeholder="Code (kg, pcs)">
                <input type="text" id="description" placeholder="Description">

                <button onclick="saveUom()">Save</button>
                <button onclick="clearForm()">Clear</button>

                <p id="msg"></p>

            </div>

            <!-- TABLE -->
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Code</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="uomTable"></tbody>
            </table>

        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/guard.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/uom.js"></script>

    <script>
        protectPage();
    </script>

</body>
</html>
